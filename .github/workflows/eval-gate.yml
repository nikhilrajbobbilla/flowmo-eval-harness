name: eval-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug - env and installed packages
        run: |
          python -V
          pip list
          pwd
          ls -la

      - name: Scan for secrets
        run: python scripts/scan_secrets.py

      - name: Unit tests
        run: python -m pytest -v

      - name: Eval gate (fixture mode)
        run: python -m eval.run_eval --fixtures
